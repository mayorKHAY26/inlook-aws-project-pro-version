global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "inlook-webmail-Komotehinse-version-prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "inlook-webmail-Komotehinse-version-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:5000"]

  - job_name: "inlook-webmail-Komotehinse-version-frontend"
    static_configs:
      - targets: ["frontend:3000"]

  - job_name: "inlook-webmail-Komotehinse-version-node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]